<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>사용자 목록</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #777;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
<h1 style="text-align: center;">CSV에서 읽어온 사용자 목록</h1>
<table>
    <thead>
        <tr>
            <th>No</th>
            <th>User ID</th>
            <th>User Name</th>
        </tr>
    </thead>
    <tbody>
        {% for row in rows %}
        <tr>
            <td>{{ row.no }}</td>
            <td>{{ row.user_id }}</td>
            <td>{{ row.user_name }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
