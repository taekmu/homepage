<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Local Llama Chat</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
padding:30px;
}

#chat{
height:400px;
overflow:auto;
border:1px solid #444;
padding:10px;
margin-bottom:10px;
}

input{
width:80%;
padding:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h2>🦙 Local Llama Chat</h2>

<div id="chat"></div>

<input id="msg" placeholder="메시지 입력"/>
<button onclick="send()">Send</button>

<script>

async function send(){

let input = document.getElementById("msg")
let chat = document.getElementById("chat")

let message = input.value

chat.innerHTML += "<div>👤 "+message+"</div>"

let res = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
})

let data = await res.json()

chat.innerHTML += "<div>🤖 "+data.response+"</div>"

chat.scrollTop = chat.scrollHeight

input.value=""

}

</script>

</body>
</html>
