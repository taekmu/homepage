<!DOCTYPE html>
<html>
<head>
    <title>FastAPI 실시간 지도 모니터링</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #f4f4f4; }
        #map { height: calc(100vh - 70px); width: 100%; border-top: 2px solid #333; }
        
        /* 상단 컨트롤바 디자인 */
        .header {
            height: 70px;
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input {
            padding: 10px;
            width: 300px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #c0392b; }
        #status { font-size: 14px; color: #f1c40f; margin-left: auto; }
    </style>
</head>
<body>

    <div class="header">
        <strong>📍 실시간 이동 제어</strong>
        <input type="text" id="targetPlace" placeholder="지명 입력 (예: 천안역, 성정동 롯데마트)" 
               onkeypress="if(event.keyCode==13) startSimulation()">
        <button onclick="startSimulation()">이동 시작</button>
        <div id="status">연결 대기 중...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 초기화 (천안시 서북구 중심)
        var map = L.map('map').setView([36.8151, 127.1478], 15);
        
        // 배경 지도 설정 (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 마커 및 경로 선 설정
        var marker = L.marker([36.8151, 127.1478]).addTo(map);
        var polyline = L.polyline([], {color: '#e74c3c', weight: 4, opacity: 0.7}).addTo(map);

        // 2. WebSocket 연결 (자동 포트 감지)
        var ws = new WebSocket("ws://" + window.location.host + "/ws/map");

        ws.onopen = function() {
            document.getElementById('status').innerText = "✅ 서버 연결 완료";
        };

        ws.onmessage = function(event) {
            var data = JSON.parse(event.data);
            var pos = [data.lat, data.lng];
            
            // 실시간 마커 업데이트
            marker.setLatLng(pos);
            polyline.addLatLng(pos);
            map.panTo(pos); // 카메라 팔로우
            
            document.getElementById('status').innerText = "🚀 이동 중: " + data.name;
        };

        ws.onclose = function() {
            document.getElementById('status').innerText = "❌ 서버 연결 끊김";
        };

        // 3. 지명 검색 및 서버 전송 함수
        async function startSimulation() {
            var query = document.getElementById('targetPlace').value;
            const REST_API_KEY = "mykey"; // 여기에 한글 금지!
            if (!query) return;

            document.getElementById('status').innerText = "🔍 위치 검색 중...";

            try {
                const authHeader = "KakaoAK " + REST_API_KEY.trim();
                // Nominatim API 호출 (한국어 검색 최적화)

                //var response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " 대한민국")}&limit=1`);
                var response = await fetch(
                `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(query)}`,
                    {
                        method: "GET",
                        headers: {
                            "Authorization": authHeader 
                        }
                    }
                );                
                console.log(response.status); // 여기 중요
                var results = await response.json();

                if (results && results.length > 0) {
                    var lat = parseFloat(results[0].lat);
                    var lon = parseFloat(results[0].lon);
                    var name = results[0].display_name.split(',')[0]; // 짧은 지명 추출

                    // 서버(FastAPI)로 목적지 전송
                    ws.send(JSON.stringify({
                        lat: lat,
                        lng: lon,
                        name: name
                    }));
                } else {
                    alert("결과를 찾을 수 없습니다. 지역명을 포함해 정확히 입력해 보세요.");
                    document.getElementById('status').innerText = "⚠️ 검색 실패";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "🌐 네트워크 에러";
            }
        }
    </script>
</body>
</html>
