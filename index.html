<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 실시간 대시보드 & 미니게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { display: block; background: #000; cursor: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-white mb-2">AI Agent Monitor</h1>
            <p class="text-slate-400 text-sm">실시간 작업 수행 상태를 모니터링합니다.</p>
        </header>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl mb-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Task ID</span>
                    <h2 id="task-id" class="text-xl font-mono text-blue-400">#waiting...</h2>
                </div>
                <div id="status-badge" class="px-4 py-1 rounded-full text-xs font-bold bg-slate-800 text-slate-400">
                    DISCONNECTED
                </div>
            </div>

            <div class="mb-10">
                <div class="flex justify-between mb-3">
                    <span class="text-sm font-medium text-slate-300">Execution Progress</span>
                    <span id="progress-percent" class="text-sm font-bold text-blue-500">0%</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-3">
                    <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-700 shadow-[0_0_15px_rgba(37,99,235,0.5)]" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-black/30 rounded-xl p-5 border border-slate-800/50">
                <p id="status-msg" class="text-lg text-slate-300">모니터링 버튼을 눌러 시작하세요.</p>
            </div>

            <button onclick="startMonitoring()" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all active:scale-95">
                모니터링 & 게임 시작
            </button>
        </div>

        <div class="bg-black rounded-xl border border-slate-700 overflow-hidden relative shadow-inner">
            <canvas id="gameCanvas" width="600" height="300" class="w-full"></canvas>
            <div id="game-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80">
                <p id="overlay-text" class="text-white mb-4 font-bold text-xl">준비되셨나요?</p>
                <p class="text-blue-400 text-sm">상단 버튼을 누르면 시작됩니다.</p>
            </div>
        </div>
    </div>

    <script>
        // --- [1] 게임 설정 및 변수 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameActive = false;
        let globalSpeedMultiplier = 1;
        let enemies = [];
        let player = { x: 300, y: 260, size: 20, color: '#3b82f6' };

        // 마우스 조작 설정
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // 캔버스 실제 크기에 맞춰 마우스 좌표 보정
            const scaleX = canvas.width / rect.width;
            player.x = (e.clientX - rect.left) * scaleX - player.size / 2;
        });

        // --- [2] 핵심 게임 로직 ---
        function spawnEnemy() {
            if (!gameActive) return;
            
            enemies.push({
                x: Math.random() * (canvas.width - 20),
                y: 0,
                speed: (2 + Math.random() * 2) * globalSpeedMultiplier,
                size: 15
            });

            // 속도에 따라 생성 간격 조절 (최소 100ms)
            let spawnRate = Math.max(100, 800 / globalSpeedMultiplier);
            setTimeout(spawnEnemy, spawnRate);
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 플레이어 그리기
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.shadowBlur = 0;

            // 2. 적군 이동 및 그리기
            ctx.fillStyle = '#ef4444';
            enemies.forEach((enemy, index) => {
                enemy.y += enemy.speed;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

                // 충돌 검사
                if (enemy.y + enemy.size > player.y && 
                    enemy.x < player.x + player.size && 
                    enemy.x + enemy.size > player.x) {
                    gameOver();
                }
            });

            // 화면 밖 적 제거
            enemies = enemies.filter(e => e.y < canvas.height);

            requestAnimationFrame(update);
        }

        function startGame() {
            gameActive = true;
            enemies = [];
            globalSpeedMultiplier = 1;
            document.getElementById('game-overlay').classList.add('hidden');
            spawnEnemy();
            update();
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('game-overlay').classList.remove('hidden');
            document.getElementById('overlay-text').innerText = "GAME OVER!";
            document.getElementById('overlay-text').classList.add('text-red-500');
        }

        // --- [3] 서버 통신 로직 ---
        function startMonitoring() {
            const taskId = "AI-TASK-" + Math.floor(Math.random() * 1000);
            document.getElementById('task-id').innerText = "#" + taskId;

            // WebSocket 연결 (서버 주소 확인!)
            const socket = new WebSocket(`ws://127.0.0.1:8000/ws/status/${taskId}`);

            socket.onopen = () => {
                document.getElementById('status-badge').innerText = "LIVE";
                document.getElementById('status-badge').className = "px-4 py-1 rounded-full text-xs font-bold bg-green-900/30 text-green-400 border border-green-800";
                startGame(); // 연결되면 게임 시작
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // 대시보드 업데이트
                document.getElementById('progress-bar').style.width = data.progress + '%';
                document.getElementById('progress-percent').innerText = data.progress + '%';
                document.getElementById('status-msg').innerText = data.message;

                // 게임 난이도 조절
                globalSpeedMultiplier = 1 + (data.progress / 50);

                if (data.progress === 100) {
                    document.getElementById('status-badge').innerText = "COMPLETED";
                    document.getElementById('status-badge').className = "px-4 py-1 rounded-full text-xs font-bold bg-blue-900/30 text-blue-400 border border-blue-800";
                    // 작업 완료 후에도 게임은 계속하고 싶다면 아래 주석을 유지하세요.
                    // gameActive = false; 
                }
            };

            socket.onerror = () => {
                alert("서버 연결에 실패했습니다. FastAPI 서버가 작동 중인지 확인해 주세요!");
            };
        }
    </script>
</body>
</html>
